version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nilerr
    - prealloc
    - revive
    - staticcheck
    - unconvert
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    gosec:
      excludes:
        - G101 # false positives on variable names like "token"
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - gocritic
          - gosec
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
