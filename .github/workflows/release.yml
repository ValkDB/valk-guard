name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25.8'
          cache-dependency-path: go.sum

      - name: Verify Go toolchain
        run: go version

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.404'

      - name: Cache NuGet packages
        uses: actions/cache@0637707758659e81f5f0c2bb7b1d276a4737b6e0 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('internal/scanner/csharp/roslynextractor/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run tests
        env:
          VALK_REQUIRE_DOTNET: '1'
        run: go test -race ./...

      - name: Run Roslyn extractor tests
        run: dotnet test internal/scanner/csharp/roslynextractor/RoslynExtractor.Tests/RoslynExtractor.Tests.csproj --nologo

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
