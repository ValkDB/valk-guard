name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: valk-guard

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25.8'
          cache-dependency-path: valk-guard/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.6.0
          install-mode: goinstall
          working-directory: valk-guard

      - name: go vet
        working-directory: valk-guard
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: valk-guard

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25.8'
          cache-dependency-path: valk-guard/go.sum

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.404'

      - name: Cache NuGet packages
        uses: actions/cache@0637707758659e81f5f0c2bb7b1d276a4737b6e0 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('valk-guard/internal/scanner/csharp/roslynextractor/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Verify Python
        run: python3 --version

      - name: Verify .NET
        run: dotnet --info

      - name: Run tests
        working-directory: valk-guard
        env:
          VALK_REQUIRE_DOTNET: '1'
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run Roslyn extractor tests
        working-directory: valk-guard
        run: dotnet test internal/scanner/csharp/roslynextractor/RoslynExtractor.Tests/RoslynExtractor.Tests.csproj --nologo

      - name: Print coverage
        working-directory: valk-guard
        run: go tool cover -func=coverage.out

      - name: Vulnerability check
        working-directory: valk-guard
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  csharp-windows:
    name: C# Scanner (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: valk-guard

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25.8'
          cache-dependency-path: valk-guard/go.sum

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.404'

      - name: Cache NuGet packages
        uses: actions/cache@0637707758659e81f5f0c2bb7b1d276a4737b6e0 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('valk-guard/internal/scanner/csharp/roslynextractor/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run C# scanner tests
        working-directory: valk-guard
        env:
          VALK_REQUIRE_DOTNET: '1'
        run: go test ./internal/scanner/csharp

      - name: Run Roslyn extractor tests
        working-directory: valk-guard
        run: dotnet test internal/scanner/csharp/roslynextractor/RoslynExtractor.Tests/RoslynExtractor.Tests.csproj --nologo

  self-scan:
    name: Self-scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: valk-guard

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25.8'
          cache-dependency-path: valk-guard/go.sum

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.404'

      - name: Cache NuGet packages
        uses: actions/cache@0637707758659e81f5f0c2bb7b1d276a4737b6e0 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('valk-guard/internal/scanner/csharp/roslynextractor/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build valk-guard
        working-directory: valk-guard
        run: go build -ldflags "-s -w -X main.version=${GITHUB_SHA}" -o valk-guard ./cmd/valk-guard/

      - name: Scan testdata
        working-directory: valk-guard
        run: |
          set +e
          ./valk-guard scan testdata/ --format json
          code=$?
          set -e
          if [ "$code" -gt 1 ]; then
            exit "$code"
          fi

  pr-review:
    name: PR Review (Valk Guard)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: valk-guard
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25.8'
          cache-dependency-path: valk-guard/go.sum

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.404'

      - name: Cache NuGet packages
        uses: actions/cache@0637707758659e81f5f0c2bb7b1d276a4737b6e0 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('valk-guard/internal/scanner/csharp/roslynextractor/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build valk-guard
        working-directory: valk-guard
        run: go build -ldflags "-s -w -X main.version=${GITHUB_SHA}" -o valk-guard ./cmd/valk-guard/

      - name: Collect changed SQL-related files
        id: changed
        working-directory: valk-guard
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          files="$(git diff --name-only --diff-filter=ACMRT "$base_sha" "$head_sha" | grep -E '\.(sql|go|py|cs)$' || true)"

          if [ -z "$files" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$files" > changed-files.txt
          count="$(wc -l < changed-files.txt | tr -d ' ')"
          echo "has_files=true" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          cat changed-files.txt

      - name: Run valk-guard on changed files
        if: steps.changed.outputs.has_files == 'true'
        working-directory: valk-guard
        run: |
          mapfile -t files < changed-files.txt

          set +e
          ./valk-guard scan "${files[@]}" --format rdjsonl > valk-guard.rdjsonl
          code=$?
          set -e

          # findings => code 1 (non-blocking for review comments)
          # failures => code 2+ (block because scanner/runtime/config issue)
          if [ "$code" -gt 1 ]; then
            exit "$code"
          fi

      - name: Upload valk-guard rdjsonl report
        if: always() && steps.changed.outputs.has_files == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: valk-guard-pr-rdjsonl-${{ github.event.pull_request.number }}
          path: valk-guard/valk-guard.rdjsonl
          if-no-files-found: error

      - uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        if: steps.changed.outputs.has_files == 'true'

      - name: Post PR review comments
        if: steps.changed.outputs.has_files == 'true'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: valk-guard
        run: |
          if [ ! -s valk-guard.rdjsonl ]; then
            echo "No valk-guard findings on changed files."
            exit 0
          fi

          reviewdog \
            -f=rdjsonl \
            -name="valk-guard" \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-level=none \
            < valk-guard.rdjsonl

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: valk-guard

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25.8'
          cache-dependency-path: valk-guard/go.sum

      - name: Build
        working-directory: valk-guard
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags "-s -w -X main.version=${GITHUB_SHA}" -o dist/valk-guard-${GOOS}-${GOARCH}${ext} ./cmd/valk-guard/

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: valk-guard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: valk-guard/dist/
