name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: valk-guard

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache-dependency-path: valk-guard/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: valk-guard

      - name: go vet
        working-directory: valk-guard
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: valk-guard

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache-dependency-path: valk-guard/go.sum

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify Python
        run: python3 --version

      - name: Run tests
        working-directory: valk-guard
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Print coverage
        working-directory: valk-guard
        run: go tool cover -func=coverage.out

      - name: Vulnerability check
        working-directory: valk-guard
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  self-scan:
    name: Self-scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          path: valk-guard

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache-dependency-path: valk-guard/go.sum

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build valk-guard
        working-directory: valk-guard
        run: go build -o valk-guard ./cmd/valk-guard/

      - name: Scan testdata (verbose)
        working-directory: valk-guard
        run: |
          set +e
          ./valk-guard scan testdata/ --verbose --format json
          code=$?
          set -e
          if [ "$code" -gt 1 ]; then
            exit "$code"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          path: valk-guard

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache-dependency-path: valk-guard/go.sum

      - name: Build
        working-directory: valk-guard
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -o dist/valk-guard-${GOOS}-${GOARCH}${ext} ./cmd/valk-guard/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: valk-guard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: valk-guard/dist/
